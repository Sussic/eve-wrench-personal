name: "Release"

on:
  workflow_dispatch:
  push:
    branches:
      - release

jobs:
  # Build the "What's Changed" notes from conventional commits since the last
  # release tag, and hand them to the release job.
  changelog:
    runs-on: ubuntu-latest
    outputs:
      notes: ${{ steps.notes.outputs.notes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --unreleased --strip header

      - name: Prepare notes output
        id: notes
        shell: bash
        env:
          CONTENT: ${{ steps.cliff.outputs.content }}
        run: |
          notes="## What's Changed"$'\n\n'"$CONTENT"
          # Fall back to a placeholder if there were no notable commits
          if [ -z "$(printf '%s' "$CONTENT" | tr -d '[:space:]')" ]; then
            notes="See the assets below to download and install EVE Wrench."
          fi
          {
            echo 'notes<<CHANGELOG_EOF'
            echo "$notes"
            echo CHANGELOG_EOF
          } >> "$GITHUB_OUTPUT"

  publish-tauri:
    needs: changelog
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm install

      # A hyphenated semver (e.g. 0.3.0-preview.1) marks a pre-release, so the
      # GitHub release is flagged accordingly and stable users aren't notified.
      - name: Detect pre-release
        id: version
        shell: bash
        run: echo "prerelease=$(node -p "require('./src-tauri/tauri.conf.json').version.includes('-')")" >> "$GITHUB_OUTPUT"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "EVE Wrench v__VERSION__"
          releaseBody: ${{ needs.changelog.outputs.notes }}
          releaseDraft: true
          prerelease: ${{ steps.version.outputs.prerelease }}
          args: ${{ matrix.args }}

      # The compiled binary is self-contained (the frontend is embedded), so
      # ship it as a no-install portable build alongside the installers.
      # Requires the WebView2 runtime, which ships with modern Windows.
      - name: Upload portable Windows executable
        if: matrix.platform == 'windows-latest'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version=$(node -p "require('./src-tauri/tauri.conf.json').version")
          exe=$(find src-tauri/target/release -maxdepth 1 -name '*.exe' | head -1)
          dest="EVE-Wrench_${version}_x64-portable.exe"
          cp "$exe" "$dest"
          gh release upload "v${version}" "$dest" --clobber
